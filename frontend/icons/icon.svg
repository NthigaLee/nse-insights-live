  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="256" rx="112" ry="112" fill="url(#g2)"/>
  <!-- N mark -->
  <g fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-weight="800">
    <text x="256" y="340" font-size="280" text-anchor="middle" letter-spacing="-12">N</text>

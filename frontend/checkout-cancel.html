<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e88ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

<title>Payment cancelled — NSE Insights</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; }
  .wrap {
    max-width: 480px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
    padding: 2.8rem 2.3rem;
    text-align: center;
  }
  .icon {
    width: 64px; height: 64px;
    margin: 0 auto 1.2rem;
    border-radius: 50%;
    background: var(--bg-sunk);
    color: var(--text-muted);
    display: grid; place-items: center;
    font-size: 1.8rem;
    border: 1px solid var(--border);
  }
  h1 { font-family: var(--font-serif); font-size: 1.6rem; margin-bottom: 0.7rem; }
  p { color: var(--text-secondary); margin-bottom: 1.8rem; line-height: 1.6; }
  .actions { display: flex; flex-direction: column; gap: 0.55rem; }
  .help {
    margin-top: 1.8rem;
    padding-top: 1.4rem;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .help a { color: var(--navy-700); font-weight: 600; }
</style>
</head>
<body class="light">
<div class="wrap">
  <div class="icon">⊘</div>
  <h1>Payment cancelled</h1>
  <p>No charge was made. Your account hasn't changed, so you can keep using the Free tier or try again whenever you're ready.</p>
  <div class="actions">
    <a href="pricing.html" class="btn btn-primary">Back to pricing</a>
    <a href="/dashboard" class="btn btn-ghost">Continue with Free</a>
  </div>
  <div class="help">
    Payment kept failing? <a href="mailto:support@nseinsights.co.ke">Email support</a> — we respond within a few hours.
  </div>
</div>
  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }
  </script>
</body>
</html>

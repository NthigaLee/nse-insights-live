<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e88ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

<title>Page not found — NSE Insights</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; background: var(--bg-base); }
  .wrap { max-width: 540px; text-align: center; }
  .tag {
    font-family: var(--font-serif);
    font-size: clamp(5rem, 16vw, 9rem);
    font-weight: 700;
    line-height: 1;
    color: var(--navy-900);
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
    position: relative;
    display: inline-block;
  }
  body.dark .tag { color: var(--gold-500); }
  .tag::after {
    content: '';
    position: absolute;
    left: 50%; bottom: -10px;
    transform: translateX(-50%);
    width: 80px; height: 4px;
    background: var(--gold-500);
    border-radius: 2px;
  }
  h1 {
    font-family: var(--font-serif);
    font-size: 1.8rem;
    margin: 1.8rem 0 0.8rem;
    letter-spacing: -0.01em;
  }
  p { color: var(--text-secondary); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
  .actions { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
  .quotes {
    margin-top: 3rem;
    padding: 1.2rem 1.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.9rem;
    max-width: 440px;
    margin-left: auto; margin-right: auto;
  }
  .quotes small { display: block; margin-top: 0.5rem; font-style: normal; font-family: var(--font-sans); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-600); }
</style>
</head>
<body class="light">
<div class="wrap">
  <div class="tag">404</div>
  <h1>This page isn't listed.</h1>
  <p>The page you're looking for isn't in our index. It may have moved, been renamed, or been delisted. Head back to the trading floor.</p>
  <div class="actions">
    <a href="landing.html" class="btn btn-primary">Back to home</a>
    <a href="/dashboard" class="btn btn-outline">Open dashboard</a>
  </div>
  <div class="quotes">
    "In investing, what is comfortable is rarely profitable."
    <small>— Robert Arnott</small>
  </div>
</div>
  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }
  </script>
</body>
</html>

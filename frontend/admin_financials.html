<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e88ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

<title>NSE Insights — Financials Review</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js?v=2"></script>
  <script src="tier-access.js?v=1"></script>
<script src="data.js?v=5"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 60px;
    min-height: 60px;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 100;
  }

  .topbar-logo {
    font-size: 16px;
    font-weight: 700;
    color: #0a3d7a;
    white-space: nowrap;
    margin-right: 8px;
  }

  .topbar-sep {
    width: 1px;
    height: 28px;
    background: #2a2a2a;
    margin: 0 4px;
  }

  .topbar-spacer { flex: 1; }

  .period-btn {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #aaa;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .period-btn:hover { border-color: #0a3d7a; color: #e0e0e0; }
  .period-btn.active { background: #0a3d7a; border-color: #0a3d7a; color: #000; }

  #status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: #222;
    color: #777;
    border: 1px solid #333;
    white-space: nowrap;
  }
  #status-badge.draft { background: #2a1f00; color: #f0a000; border-color: #5a3f00; }
  #status-badge.approved { background: #0a2010; color: #40c060; border-color: #1a5030; }

  .tier-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #1a1a1a;
    color: #888;
    border: 1px solid #333;
    white-space: nowrap;
  }
  .tier-badge.tier-professional { background: #0a1a10; color: #0a3d7a; border-color: #0a3d7a; }

  .btn-save {
    background: transparent;
    border: 1px solid #0a3d7a;
    color: #0a3d7a;
    border-radius: 5px;
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-save:hover { background: #0a1a10; }

  .btn-approve {
    background: #0a3d7a;
    border: 1px solid #0a3d7a;
    color: #000;
    border-radius: 5px;
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-weight: 600;
  }
  .btn-approve:hover { background: #c9a961; }

  /* ── MAIN LAYOUT (3 panels) ── */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT PANEL: Company List ── */
  .left-panel {
    width: 240px;
    min-width: 240px;
    background: #141414;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .company-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .company-list::-webkit-scrollbar { width: 4px; }
  .company-list::-webkit-scrollbar-track { background: transparent; }
  .company-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .company-item {
    display: flex;
    align-items: center;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    gap: 8px;
  }
  .company-item:hover { background: #1e1e1e; }
  .company-item.selected { background: #0a1a10; border-left-color: #0a3d7a; }

  .status-indicator {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #444;
  }
  .status-indicator.approved { background: #40c060; }
  .status-indicator.draft { background: #f0a000; }

  .company-item-name {
    font-size: 12px;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .company-item.selected .company-item-name { color: #0a3d7a; }

  /* ── MIDDLE PANEL: PDF Viewer ── */
  .middle-panel {
    flex: 1;
    background: #161616;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .pdf-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .pdf-section-header {
    padding: 12px 14px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: #1a1a1a;
    flex-shrink: 0;
  }

  .pdf-toggle-arrow {
    font-size: 10px;
    color: #666;
    transition: transform 0.2s;
  }
  .pdf-toggle-arrow.collapsed { transform: rotate(-90deg); }

  .pdf-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pdf-container iframe {
    flex: 1;
    border: none;
    background: #222;
  }

  .pdf-open-link {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    font-size: 12px;
    color: #888;
    background: #1a1a1a;
    border-top: 1px solid #222;
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }
  .pdf-open-link:hover { color: #c9a961; }

  .pdf-no-source {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #444;
    font-size: 13px;
  }

  .pdf-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #444;
    font-size: 13px;
  }

  /* ── RIGHT PANEL: Financial Data ── */
  .right-panel {
    width: 420px;
    min-width: 420px;
    background: #161616;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .data-header {
    padding: 12px 14px;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }

  .data-header-title {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .data-header-name {
    font-size: 13px;
    color: #ccc;
    font-weight: 500;
    margin-top: 4px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    background: #1a1a1a;
    padding: 0 12px;
    gap: 0;
    overflow-x: auto;
  }

  .tab-btn {
    flex: 0 1 auto;
    padding: 10px 12px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #aaa; }
  .tab-btn.active { color: #0a3d7a; border-bottom-color: #0a3d7a; }

  /* ── TAB CONTENT ── */
  #tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #tab-content::-webkit-scrollbar { width: 4px; }
  #tab-content::-webkit-scrollbar-track { background: transparent; }
  #tab-content::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }

  .summary-card {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 10px;
    transition: border-color 0.2s;
  }
  .summary-card:hover { border-color: #0a3d7a; }

  .summary-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .summary-value {
    font-size: 14px;
    font-weight: 600;
    color: #0a3d7a;
    font-family: 'JetBrains Mono', monospace;
  }

  .financial-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  th {
    background: #1a1a1a;
    border-bottom: 1px solid #222;
    padding: 6px 8px;
    text-align: left;
    color: #888;
    font-weight: 600;
  }

  td {
    padding: 6px 8px;
    border-bottom: 1px solid #222;
  }

  .metric-label {
    color: #ccc;
    font-weight: 500;
  }

  tr:hover { background: #1a1a1a; }

  .valuation-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }

  .valuation-card {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 10px;
    transition: border-color 0.2s;
  }
  .valuation-card:hover { border-color: #0a3d7a; }

  .valuation-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .valuation-value {
    font-size: 14px;
    font-weight: 600;
    color: #0a3d7a;
    font-family: 'JetBrains Mono', monospace;
  }

  .notes-textarea {
    width: 100%;
    min-height: 150px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 8px;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }
  .notes-textarea:focus { border-color: #0a3d7a; }

  .notes-hint {
    font-size: 10px;
    color: #666;
    margin-top: 6px;
  }

  .hidden { display: none !important; }

  .text-muted { color: #666; }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    color: #e0e0e0;
    z-index: 9999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    height: 100%;
    color: #444;
  }
  .empty-state-icon { font-size: 40px; }
  .empty-state-text { font-size: 14px; }
</style>
</head>
<body class="light">
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">NSE Financials Review</div>
    <div class="topbar-sep"></div>
    <button class="btn-save" onclick="window.location.href = '/dashboard'" title="Back to Dashboard">← Dashboard</button>

    <div class="year-buttons" style="display: flex; gap: 4px; margin-left: 12px;">
      <button class="period-btn active" data-period="annual">Annual</button>
      <button class="period-btn" data-period="quarterly">Quarterly</button>
    </div>

    <span id="status-badge">○ Draft</span>
    <span class="tier-badge" id="tier-badge" title="Your current subscription tier">Professional</span>

    <div class="topbar-spacer"></div>

    <button id="save-review-btn" class="btn-save" onclick="saveReview()">Save Review</button>
    <button id="approve-review-btn" class="btn-approve" onclick="approveReview()">Approve ✓</button>
  </div>

  <!-- MAIN LAYOUT (3 PANELS) -->
  <div class="main-layout">

    <!-- LEFT PANEL: Company List -->
    <div class="left-panel">
      <div class="panel-header">
        <div class="panel-title">Companies</div>
      </div>
      <div class="company-list" id="company-list"></div>
    </div>

    <!-- MIDDLE PANEL: PDF Viewer -->
    <div class="middle-panel">
      <div class="pdf-section" id="pdf-section">
        <div class="pdf-section-header" onclick="togglePdfSection()">
          <span class="panel-title" style="margin: 0;">Source Document</span>
          <span class="pdf-toggle-arrow" id="pdf-toggle-arrow">▼</span>
        </div>
        <div id="pdf-viewer-wrap">
          <div class="pdf-container" id="pdf-container" style="display:none">
            <iframe id="pdf-iframe" src="about:blank"></iframe>
            <a id="pdf-open-link" class="pdf-open-link" href="#" target="_blank">Open in new tab ↗</a>
          </div>
          <div class="pdf-no-source" id="pdf-no-source" style="display:none">No source document available</div>
          <div class="pdf-empty" id="pdf-empty">Select a company to view source documents</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Financial Data -->
    <div class="right-panel">
      <div class="data-header">
        <span class="data-header-title">Financial Data</span>
        <span class="data-header-name" id="company-name">—</span>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="summary">Summary</button>
        <button class="tab-btn" data-tab="income">Income Statement</button>
        <button class="tab-btn" data-tab="balance">Balance Sheet</button>
        <button class="tab-btn" data-tab="valuation">Valuation</button>
        <button class="tab-btn" data-tab="notes">Notes</button>
      </div>

      <!-- TAB CONTENT -->
      <div id="tab-content"></div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script src="admin_financials.js?v=2"></script>
  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }
  </script>
</body>
</html>
